{{- $daemons := list 
  (dict "key" "oauthManager" "name" "oauth-manager" "args" "rucio-oauth-manager --threads 1 --sleep-time 10")
  (dict "key" "conveyorTransferSubmitter" "name" "conveyor-submitter" "args" "rucio-conveyor-submitter --total-threads 1 --sleep-time 10")
  (dict "key" "conveyorPoller" "name" "conveyor-poller" "args" "rucio-conveyor-poller --total-threads 1 --sleep-time 10")
  (dict "key" "conveyorFinisher" "name" "conveyor-finisher" "args" "rucio-conveyor-finisher --total-threads 1 --sleep-time 10")
  (dict "key" "judgeEvaluator" "name" "judge-evaluator" "args" "rucio-judge-evaluator --threads 1 --sleep-time 10")
  (dict "key" "transmogrifier" "name" "transmogrifier" "args" "rucio-transmogrifier --threads 1 --sleep-time 10")
  (dict "key" "reaper" "name" "reaper" "args" "rucio-reaper --threads 1 --sleep-time 10")
-}}

{{- range $daemon := $daemons }}
  {{- $countKey := printf "%sCount" $daemon.key -}}
  {{- $count := index $.Values.daemons $countKey | default 0 }}
  {{- if gt (int $count) 0 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ $daemon.name }}
  labels:
    app: {{ $daemon.name }}
    rucio-daemon: "true"
spec:
  replicas: {{ $count }}
  selector:
    matchLabels:
      app: {{ $daemon.name }}
  template:
    metadata:
      labels:
        app: {{ $daemon.name }}
    spec:
      volumes:
        - name: rucio-config-volume
          configMap:
            name: rucio-config
        # 1. Mount the OIDC Secret Volume
        - name: oidc-secret-volume
          secret:
            secretName: rucio-oidc-secret
            defaultMode: 0444
        # 2. Mount Server Certificates (Needed for FTS authentication)
        - name: server-certs-volume
          secret:
            secretName: rucio-server-certs
        - name: ca-certs-volume
          secret:
            secretName: rucio-ca-secret

      containers:
        - name: {{ $daemon.name }}
          image: "{{ $.Values.daemons.image }}"
          imagePullPolicy: Always
          command: ["/bin/bash", "-c"]
          args:
            - |
              # Run the daemon with specific arguments

              echo "[postStart Hook] 1. Downloading EGI repo file..."
              curl -o /etc/yum.repos.d/egi-trustanchors.repo https://repository.egi.eu/sw/production/cas/1/current/repo-files/egi-trustanchors.repo
              
              echo "[postStart Hook] 2. Installing ca-policy-egi-core..."
              dnf install -y ca-policy-egi-core
              
              echo "[postStart Hook] 3. Installing gfal2-plugin-xrootd..."
              dnf install -y gfal2-plugin-xrootd

              echo "[postStart Hook] 4. Clean up dnf..."
              dnf clean all

              {{ $daemon.args }}
          
          volumeMounts:
            - name: rucio-config-volume
              mountPath: /opt/rucio/etc/rucio.cfg
              subPath: rucio.cfg
            # 1. Mount the idpsecrets.json explicitly
            - name: oidc-secret-volume
              mountPath: /opt/rucio/etc/idpsecrets.json
              subPath: idpsecrets.json
              readOnly: true
            # 2. Mount Certificates
            - name: server-certs-volume
              mountPath: /etc/grid-security/hostcert.pem
              subPath: hostcert.pem
              readOnly: true
            - name: server-certs-volume
              mountPath: /etc/grid-security/hostkey.pem
              subPath: hostkey.pem
              readOnly: true
            # FIX: Ensure this mount matches the 'cp' command source
            - name: ca-certs-volume
              mountPath: /etc/grid-security/ca.pem
              subPath: ca.pem
              readOnly: true
          
          env:
            # Database Connection
            - name: RUCIO_CFG_DATABASE_DEFAULT
              value: "postgresql+psycopg://{{ $.Values.postgresql.auth.username }}:{{ $.Values.postgresql.auth.password }}@{{ $.Values.rucio.server.db_host }}/{{ $.Values.postgresql.auth.database }}"
            # Certificate paths for the daemon (Used to talk to FTS)
            - name: X509_USER_CERT
              value: "/etc/grid-security/hostcert.pem"
            - name: X509_USER_KEY
              value: "/etc/grid-security/hostkey.pem"
            - name: X509_CERT_DIR
              value: "/etc/grid-security/certificates"
            # OIDC Specific Env Vars
            - name: RUCIO_ENABLE_SSL
              value: "True"
  {{- end }}
{{- end }}