{{- if .Values.client.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: rucio-client-config
data:
  rucio.cfg: |
    [client]
    rucio_host = {{ required "rucio.server.host is required!" .Values.rucio.server.host }}
    auth_host = {{ required "rucio.server.host is required!" .Values.rucio.server.host }}
    auth_type = {{ .Values.client.config.auth_type }}
    account = {{ .Values.client.config.account }}
    username = {{ .Values.client.config.username }}
    password = {{ .Values.client.config.password }}

    ca_cert = /etc/grid-security/ca.pem
    client_cert = /opt/rucio/certs/user/usercert.pem
    client_key = /opt/rucio/certs/user/userkey.pem
    request_retries = 3
    # OIDC specific settings
    oidc_scope = openid profile offline_access storage.create:/ storage.read:/ storage.modify:/ wlcg wlcg.groups fts fts:submit-transfer
    oidc_polling = True

    oidc_issuer = {{ .Values.oidcCredentials.adminIssuer }}
    oidc_audience = rucio {{ .Values.oidcCredentials.oidcAudience }} https://wlcg.cern.ch/jwt/v1/any
    auth_oidc_refresh_active = true
    auth_oidc_refresh_before_exp = 20

    [oidc]
    idpsecrets = /opt/rucio/etc/idpsecrets.json
    admin_issuer = {{ .Values.oidcCredentials.adminIssuer }}
    expected_audience = rucio
    expected_scope = openid profile    

  register-rse.sh: |
    #!/bin/sh
    set -e

    export RUCIO_AUTH_TYPE=x509    

    RSE_BOULBY="BOULBY-XROOTD"
    RSE_IC="UKI-LT2-IC-HEP-DISK"
    RSE_RAL="RALPPD-RSE"

    echo "RSE Registration Script: Starting..."
    
    echo "Waiting for Rucio server and init-job to complete..."
    until rucio whoami; do
      echo "Rucio not ready yet. Retrying in 10 seconds..."
      sleep 10
    done
    echo "✅ Rucio server is ready."
    
    # ===================================================================
    #  Configure BOULBY-XROOTD
    # ===================================================================
    echo "Checking if RSE '$RSE_BOULBY' already exists..."
    if rucio rse attribute get "$RSE_BOULBY" rse_type >/dev/null 2>&1; then
      echo "✅ RSE '$RSE_BOULBY' already exists. Ensuring configuration..."
    else
      echo "Registering new RSE: $RSE_BOULBY"
      rucio rse add "$RSE_BOULBY"
    fi

    echo "Attempting to delete old protocol (if exists)..."
    rucio rse protocol remove "$RSE_BOULBY" --scheme root --hostname "xlzd-data.boulby.ac.uk" --port 1094 || true

    echo "Setting RSE protocol using xrootd.Default implementation..."
    rucio rse protocol add "$RSE_BOULBY" --host "xlzd-data.boulby.ac.uk" --scheme davs \
      --port 1094 \
      --prefix "/" \
      --impl "rucio.rse.protocols.gfal.Default" \
      --domain-json '{"lan": {"read": 1, "write": 1, "delete": 1}, "wan": {"read": 1, "write": 1, "delete": 1, "third_party_copy_read": 1, "third_party_copy_write": 1}}'

    echo "Setting RSE attributes for OIDC authentication..."
    rucio rse attribute remove "$RSE_BOULBY" --key auth_token || true
    rucio rse attribute add "$RSE_BOULBY" --key "oidc_issuer" --value "https://xlzd-iam.boulby.ac.uk"
    rucio rse attribute add "$RSE_BOULBY" --key "oidc_client_id_path" --value "/opt/rucio/etc/oidc/oidc_client_id"
    rucio rse attribute add "$RSE_BOULBY" --key "oidc_client_secret_path" --value "/opt/rucio/etc/oidc/oidc_client_secret"
    rucio rse attribute add "$RSE_BOULBY" --key "oidc_scope" --value "storage.read:/ storage.create:/ storage.modify:/ openid profile offline_access"
    rucio rse attribute add "$RSE_BOULBY" --key "oidc_support" --value True

    rucio rse attribute add "$RSE_BOULBY" --key "lfn2pfn_algorithm" --value "hash"
    rucio rse attribute add "$RSE_BOULBY" --key "fts" --value "https://fts00.grid.hep.ph.ic.ac.uk:8446"
    rucio rse attribute add "$RSE_BOULBY" --key "fts3" --value "https://fts00.grid.hep.ph.ic.ac.uk:8446"
    
    echo "Setting RSE limits..."
    rucio account limit add root --rse "$RSE_BOULBY" --bytes 1000000000000 # 1TB

    echo "✅ Successfully configured RSE '$RSE_BOULBY'."

    # ===================================================================
    #  Configure UKI-LT2-IC-HEP-DISK
    # ===================================================================
    echo "Checking if RSE '$RSE_IC' already exists..."
    if rucio rse attribute get "$RSE_IC" rse_type >/dev/null 2>&1; then
      echo "✅ RSE '$RSE_IC' already exists. Ensuring configuration..."
    else
      echo "Registering new RSE: $RSE_IC"
      rucio rse add "$RSE_IC"
    fi

    echo "Attempting to delete old protocol (if exists)..."
    rucio rse protocol remove "$RSE_IC" --scheme davs --hostname "gfe02.grid.hep.ph.ic.ac.uk" --port 2880 || true

    echo "Setting RSE protocol for $RSE_IC..."
    rucio rse protocol add "$RSE_IC" \
      --host "gfe02.grid.hep.ph.ic.ac.uk" \
      --scheme "davs" \
      --port 2880 \
      --prefix "/pnfs/hep.ph.ic.ac.uk/data/xlzd/rstealth/" \
      --impl "rucio.rse.protocols.gfal.Default" \
      --domain-json '{"lan": {"read": 1, "write": 1, "delete": 1}, "wan": {"read": 1, "write": 1, "delete": 1, "third_party_copy_read": 1, "third_party_copy_write": 1}}'

    echo "Setting RSE attributes for OIDC authentication on $RSE_IC..."
    rucio rse attribute remove "$RSE_IC" --key auth_token || true
    rucio rse attribute add "$RSE_IC" --key "oidc_issuer" --value "https://xlzd-iam.boulby.ac.uk"
    rucio rse attribute add "$RSE_IC" --key "oidc_client_id_path" --value "/opt/rucio/etc/oidc/oidc_client_id"
    rucio rse attribute add "$RSE_IC" --key "oidc_client_secret_path" --value "/opt/rucio/etc/oidc/oidc_client_secret"
    rucio rse attribute add "$RSE_IC" --key "oidc_scope" --value "storage.read:/ storage.create:/ storage.modify:/ openid profile offline_access"
    
    rucio rse attribute add "$RSE_IC" --key "oidc_support" --value True
    rucio rse attribute add "$RSE_IC" --key "oidc_base_path" --value "/pnfs/hep.ph.ic.ac.uk/data/xlzd"

    rucio rse attribute add "$RSE_IC" --key "lfn2pfn_algorithm" --value "hash"

    rucio rse attribute add "$RSE_IC" --key "fts" --value "https://fts00.grid.hep.ph.ic.ac.uk:8446"
    rucio rse attribute add "$RSE_IC" --key "fts3" --value "https://fts00.grid.hep.ph.ic.ac.uk:8446"    

    echo "Setting RSE limits for $RSE_IC..."
    rucio account limit add root --rse "$RSE_IC" --bytes 1000000000000 # 1TB

    echo "✅ Successfully configured RSE '$RSE_IC' with OIDC."


    # ===================================================================
    #  Configure RALPPD-RSE
    # ===================================================================
    echo "Checking if RSE '$RSE_RAL' already exists..."
    if rucio rse attribute get "$RSE_RAL" rse_type >/dev/null 2>&1; then
      echo "✅ RSE '$RSE_RAL' already exists. Ensuring configuration..."
    else
      echo "Registering new RSE: $RSE_RAL"
      rucio rse add "$RSE_RAL"
    fi

    echo "Attempting to delete old protocol (if exists)..."
    rucio rse protocol remove "$RSE_RAL" --scheme davs --hostname "mover.pp.rl.ac.uk" --port 2880 || true

    echo "Setting RSE protocol for $RSE_RAL..."
    rucio rse protocol add "$RSE_RAL" \
      --host "mover.pp.rl.ac.uk" \
      --scheme "davs" \
      --port 2880 \
      --prefix "/pnfs/pp.rl.ac.uk/data/gridpp/xlzd/" \
      --impl "rucio.rse.protocols.gfal.Default" \
      --domain-json '{"lan": {"read": 1, "write": 1, "delete": 1}, "wan": {"read": 1, "write": 1, "delete": 1, "third_party_copy_read": 1, "third_party_copy_write": 1}}'

    echo "Setting RSE attributes for OIDC authentication on $RSE_RAL..."
    rucio rse attribute remove "$RSE_RAL" --key auth_token || true
    rucio rse attribute add "$RSE_RAL" --key "oidc_issuer" --value "https://xlzd-iam.boulby.ac.uk"
    rucio rse attribute add "$RSE_RAL" --key "oidc_client_id_path" --value "/opt/rucio/etc/oidc/oidc_client_id"
    rucio rse attribute add "$RSE_RAL" --key "oidc_client_secret_path" --value "/opt/rucio/etc/oidc/oidc_client_secret"
    rucio rse attribute add "$RSE_RAL" --key "oidc_scope" --value "storage.read:/ storage.create:/ storage.modify:/ openid profile offline_access"
    
    rucio rse attribute add "$RSE_RAL" --key "oidc_support" --value True
    rucio rse attribute add "$RSE_RAL" --key "oidc_base_path" --value "/pnfs/pp.rl.ac.uk/data/gridpp/xlzd"

    rucio rse attribute add "$RSE_RAL" --key "lfn2pfn_algorithm" --value "hash"

    rucio rse attribute add "$RSE_RAL" --key "fts" --value "https://fts00.grid.hep.ph.ic.ac.uk:8446"
    rucio rse attribute add "$RSE_RAL" --key "fts3" --value "https://fts00.grid.hep.ph.ic.ac.uk:8446"    

    echo "Setting RSE limits for $RSE_RAL..."
    rucio account limit add root --rse "$RSE_RAL" --bytes 1000000000000 # 1TB

    echo "✅ Successfully configured RSE '$RSE_RAL' with OIDC."    

    # ===================================================================
    #  Set Distances
    # ===================================================================
    echo "Setting distances..."
    rucio rse distance add --distance 3 "$RSE_IC" "$RSE_BOULBY"
    rucio rse distance add --distance 3 "$RSE_BOULBY" "$RSE_IC"
    rucio rse distance add --distance 3 "$RSE_BOULBY" "$RSE_RAL"
    rucio rse distance add --distance 3 "$RSE_RAL" "$RSE_BOULBY"
    rucio rse distance add --distance 3 "$RSE_IC" "$RSE_RAL"
    rucio rse distance add --distance 3 "$RSE_RAL" "$RSE_IC"
    # ===================================================================
    #  Setup Replication Rules (Subscriptions)
    # ===================================================================
    echo "Setting up automated replication subscription..."
    
    rucio subscription add "Auto-Replicate-XLZD" \
      --account "root" \
      --filter '{"scope": ["test"]}' \
      --rule '[{"copies": 1, "rse_expression": "'$RSE_IC'", "activity": "User Subscriptions"}, {"copies": 1, "rse_expression": "'$RSE_RAL'", "activity": "User Subscriptions"}]' \
      --comment "Automated replication to Imperial and RAL" || \
      echo "✅ Subscription 'Auto-Replicate-XLZD' already exists (or failed to create)."

    echo "✅ RSE Registration & Replication Script: Finished."
{{- end }}